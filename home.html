<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Inventory Management System - Warehouses</title>
    <link rel="stylesheet" href="home.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
</head>

<body>
    <div class="page-container">
        <header class="hero">
            <h1>Inventory Management System</h1>
            <p>Select a Warehouse Location</p>
        </header>

        <main class="center-content">
            <div class="cards">
                <div class="card clickable-div" onclick="goToWarehouse('chennai')">
                    <i class="fa fa-building warehouse-icon"></i>
                    <h3>Chennai Warehouse</h3>
                    <p>Chennai, Tamil Nadu</p>
                </div>

                <div class="card clickable-div" onclick="goToWarehouse('banglore')">
                    <i class="fa fa-building warehouse-icon"></i>
                    <h3>Bangalore Warehouse</h3>
                    <p>Bangalore, Karnataka</p>
                </div>

                <div class="card clickable-div" onclick="goToWarehouse('mumbai')">
                    <i class="fa fa-building warehouse-icon"></i>
                    <h3>Mumbai Warehouse</h3>
                    <p>Mumbai, Maharashtra</p>
                </div>

                <div class="card clickable-div" onclick="goToWarehouse('delhi')">
                    <i class="fa fa-building warehouse-icon"></i>
                    <h3>Delhi Warehouse</h3>
                    <p>New Delhi, India</p>
                </div>
            </div>
        </main>

        <footer>Inventory Management System © 2026</footer>
    </div>

    <script>
        function goToWarehouse(location) {
            localStorage.setItem("selectedWarehouse", location);

            window.location.href = "Inventory-Stock-Manager-Summary.html";
        }
    </script>
</body>

</html>
